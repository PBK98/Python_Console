<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .band-title { font: 700 16px Arial, sans-serif; fill: #334155; }
      .box { stroke-width: 1.5; rx: 8; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 5; }
      .runtime { fill: #e0f2fe; stroke: #0284c7; }
      .classbox { fill: #fed7aa; stroke: #ea580c; }
      .pybox { fill: #dcfce7; stroke: #16a34a; }
      .data { fill: #e2e8f0; stroke: #475569; }
      .note { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="900" />
  <text x="60" y="56" class="title">Budget App Source Architecture</text>
  <text x="60" y="84" class="subtitle">소스코드의 책임 분리와 실행 흐름</text>

  <rect x="955" y="30" width="255" height="78" class="legend" />
  <rect x="975" y="50" width="22" height="14" class="box classbox" />
  <text x="1008" y="62" class="box-text">Orange: class / object responsibility</text>
  <rect x="975" y="76" width="22" height="14" class="box pybox" />
  <text x="1008" y="88" class="box-text">Green: Python module file (.py)</text>

  <!-- Entry -->
  <rect x="50" y="115" width="1180" height="105" class="band" />
  <text x="70" y="145" class="band-title">1. Entry</text>

  <rect x="110" y="160" width="210" height="42" class="box runtime" />
  <text x="132" y="186" class="box-title">Terminal</text>

  <rect x="400" y="160" width="210" height="42" class="box pybox" />
  <text x="424" y="186" class="box-title">__main__.py</text>

  <rect x="690" y="160" width="230" height="42" class="box runtime" />
  <text x="714" y="186" class="box-title">SystemExit(main())</text>

  <text x="130" y="212" class="note">python3 -m budget_app</text>
  <text x="407" y="212" class="note">cli.main() 호출</text>
  <text x="699" y="212" class="note">exit code 전달</text>

  <path d="M320 181 H400" class="arrow" />
  <path d="M610 181 H690" class="arrow" />

  <!-- CLI -->
  <rect x="50" y="255" width="1180" height="150" class="band" />
  <text x="70" y="285" class="band-title">2. CLI Layer - budget_app/cli.py</text>

  <rect x="110" y="315" width="190" height="58" class="box classbox" />
  <text x="132" y="338" class="box-title">ParserBuilder</text>
  <text x="132" y="357" class="box-text">argparse 구성</text>

  <rect x="390" y="315" width="190" height="58" class="box classbox" />
  <text x="412" y="338" class="box-title">CommandRunner</text>
  <text x="412" y="357" class="box-text">명령 실행</text>

  <rect x="670" y="315" width="190" height="58" class="box classbox" />
  <text x="692" y="338" class="box-title">ServiceFactory</text>
  <text x="692" y="357" class="box-text">service 조립</text>

  <rect x="950" y="315" width="190" height="58" class="box classbox" />
  <text x="972" y="338" class="box-title">ConsolePrinter</text>
  <text x="972" y="357" class="box-text">결과 출력</text>

  <path d="M805 202 V250 H205 V315" class="arrow" />
  <path d="M300 344 H390" class="arrow" />
  <path d="M580 344 H670" class="arrow" />
  <path d="M580 358 H950" class="soft-arrow" />

  <!-- Services -->
  <rect x="50" y="440" width="1180" height="150" class="band" />
  <text x="70" y="470" class="band-title">3. Service Layer - business rules</text>

  <rect x="140" y="500" width="230" height="58" class="box classbox" />
  <text x="162" y="523" class="box-title">TransactionService</text>
  <text x="162" y="542" class="box-text">거래/검색/요약/import/export</text>

  <rect x="525" y="500" width="230" height="58" class="box classbox" />
  <text x="547" y="523" class="box-title">CategoryService</text>
  <text x="547" y="542" class="box-text">카테고리 규칙</text>

  <rect x="910" y="500" width="230" height="58" class="box classbox" />
  <text x="932" y="523" class="box-title">BudgetService</text>
  <text x="932" y="542" class="box-text">월별 예산</text>

  <path d="M485 373 V420 H255 V500" class="arrow" />
  <path d="M485 373 V420 H640 V500" class="arrow" />
  <path d="M485 373 V420 H1025 V500" class="arrow" />
  <path d="M765 373 V430 H255 V500" class="soft-arrow" />
  <path d="M765 373 V430 H640 V500" class="soft-arrow" />
  <path d="M765 373 V430 H1025 V500" class="soft-arrow" />
  <path d="M370 529 H525" class="soft-arrow" />

  <!-- Repositories -->
  <rect x="50" y="625" width="1180" height="120" class="band" />
  <text x="70" y="655" class="band-title">4. Repository Layer - JSONL file I/O</text>

  <rect x="140" y="680" width="230" height="42" class="box classbox" />
  <text x="160" y="706" class="box-title">TransactionRepository</text>

  <rect x="525" y="680" width="230" height="42" class="box classbox" />
  <text x="552" y="706" class="box-title">CategoryRepository</text>

  <rect x="910" y="680" width="230" height="42" class="box classbox" />
  <text x="940" y="706" class="box-title">BudgetRepository</text>

  <path d="M255 558 V680" class="arrow" />
  <path d="M640 558 V680" class="arrow" />
  <path d="M1025 558 V680" class="arrow" />
  <path d="M310 558 C380 600,225 635,255 680" class="soft-arrow" />
  <path d="M585 558 C510 600,285 635,255 680" class="soft-arrow" />
  <path d="M315 558 C610 590,905 620,1025 680" class="soft-arrow" />

  <!-- Data -->
  <rect x="50" y="780" width="1180" height="80" class="band" />
  <text x="70" y="810" class="band-title">5. Data Files - ./data</text>

  <rect x="140" y="825" width="230" height="28" class="box data" />
  <text x="176" y="844" class="box-title">transactions.jsonl</text>

  <rect x="525" y="825" width="230" height="28" class="box data" />
  <text x="570" y="844" class="box-title">categories.jsonl</text>

  <rect x="910" y="825" width="230" height="28" class="box data" />
  <text x="965" y="844" class="box-title">budgets.jsonl</text>

  <path d="M255 722 V825" class="arrow" />
  <path d="M640 722 V825" class="arrow" />
  <path d="M1025 722 V825" class="arrow" />

  <!-- Support modules -->
  <rect x="112" y="430" width="1026" height="1" fill="#e2e8f0" />

  <rect x="95" y="602" width="105" height="28" class="box pybox" />
  <text x="121" y="621" class="box-title">models.py</text>

  <rect x="220" y="602" width="120" height="28" class="box pybox" />
  <text x="241" y="621" class="box-title">validators.py</text>

  <rect x="360" y="602" width="105" height="28" class="box pybox" />
  <text x="383" y="621" class="box-title">sorting.py</text>

  <rect x="875" y="235" width="125" height="28" class="box pybox" />
  <text x="896" y="254" class="box-title">decorators.py</text>

  <rect x="1020" y="235" width="105" height="28" class="box pybox" />
  <text x="1045" y="254" class="box-title">errors.py</text>

  <path d="M255 500 C230 465,170 465,148 602" class="soft-arrow" />
  <path d="M255 500 C260 465,280 465,280 602" class="soft-arrow" />
  <path d="M255 500 C300 465,412 465,412 602" class="soft-arrow" />
  <path d="M485 315 C590 260,830 255,875 249" class="soft-arrow" />
  <path d="M485 315 C640 250,975 248,1020 249" class="soft-arrow" />
  <path d="M640 500 C735 425,930 310,1020 249" class="soft-arrow" />
  <path d="M1025 500 C1095 420,1095 310,1072 263" class="soft-arrow" />
</svg>
